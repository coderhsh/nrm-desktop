name: Release Installers

# 一键发布：bump 版本、归档 CHANGELOG、构建安装包、创建 GitHub Release，并同步 dev。
# 同一版本可 retry（Release 不存在）或 overwrite（勾选 overwrite_release 覆盖附件）。
on:
  workflow_dispatch:
    inputs:
      version:
        description: 发布版本号（必填，如 1.0.1）
        type: string
        required: true
      draft_release:
        description: 创建 Draft Release（可先验产物再公开）
        type: boolean
        default: false
      overwrite_release:
        description: 若该版本 GitHub Release 已存在，覆盖并重新上传安装包
        type: boolean
        default: false
      cleanup_release_assets:
        description: 上传前清理当前版本 Release 上所有 nrm-desktop 旧安装包（含重复/旧命名附件）
        type: boolean
        default: false
      build_windows_x64:
        description: 构建 Windows x64
        type: boolean
        default: true
      build_macos_x64:
        description: 构建 macOS Intel x64（CI 耗时/费用高于 Apple Silicon）
        type: boolean
        default: false
      build_macos_arm64:
        description: 构建 macOS Apple Silicon arm64
        type: boolean
        default: true
      windows_setup_exe:
        description: Windows 产出 setup.exe（NSIS）
        type: boolean
        default: true
      windows_msi:
        description: Windows 产出 .msi
        type: boolean
        default: true
      windows_portable_zip:
        description: Windows 产出 portable.zip 免安装版
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: release-installers-${{ github.ref }}-${{ inputs.version }}
  cancel-in-progress: true

env:
  CI: true
  CARGO_INCREMENTAL: 0

jobs:
  check-release:
    name: Check release context
    runs-on: ubuntu-latest
    outputs:
      prepare_mode: ${{ steps.context.outputs.prepare_mode }}
      release_exists: ${{ steps.context.outputs.release_exists }}

    steps:
      - name: Validate release version input
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ inputs.version }}" ]]; then
            echo "::error::必须填写 version（例如 1.0.1）。"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine prepare mode
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node ./scripts/check-release-context.mjs \
            --version "${{ inputs.version }}" \
            --overwrite "${{ inputs.overwrite_release }}"

      - name: Write check summary
        shell: bash
        run: |
          {
            echo "### Release 预检查"
            echo ""
            echo "- 版本：v${{ inputs.version }}"
            echo "- 模式：${{ steps.context.outputs.prepare_mode }}"
            echo "- 远程 Release 已存在：${{ steps.context.outputs.release_exists }}"
            if [[ "${{ steps.context.outputs.prepare_mode }}" == "overwrite" ]]; then
              echo "- 将覆盖已有 Release 并重新上传安装包"
            elif [[ "${{ steps.context.outputs.prepare_mode }}" == "retry" ]]; then
              echo "- 将重试发布当前版本（不重复 bump 版本/CHANGELOG）"
            else
              echo "- 将发布新版本并 bump 版本、归档 CHANGELOG"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  prepare-release:
    name: Prepare release
    needs: check-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.release.outputs.version }}
      commit_sha: ${{ steps.push.outputs.commit_sha }}
      skip_commit: ${{ steps.release.outputs.skip_commit }}
      prepare_mode: ${{ steps.release.outputs.prepare_mode }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version and archive changelog
        id: release
        run: |
          node ./scripts/prepare-release.mjs \
            --version "${{ inputs.version }}" \
            --mode "${{ needs.check-release.outputs.prepare_mode }}"

      - name: Commit and push release preparation
        id: push
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ steps.release.outputs.skip_commit }}" == "true" ]]; then
            echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            echo "retry/overwrite 模式：跳过 commit，复用当前 HEAD。"
            exit 0
          fi

          if git diff --quiet && git diff --cached --quiet; then
            echo "::error::prepare-release 未产生任何文件变更。"
            exit 1
          fi
          git add package.json CHANGELOG.md CHANGELOG.zh-CN.md src-tauri/tauri.conf.json src-tauri/Cargo.toml src-tauri/Cargo.lock
          git commit -m "chore: release v${{ steps.release.outputs.version }}"
          git push origin "HEAD:${{ github.ref_name }}"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Write release summary
        shell: bash
        run: |
          {
            echo "### 一键发布准备完成"
            echo ""
            echo "- 版本：v${{ steps.release.outputs.version }}"
            echo "- 模式：${{ steps.release.outputs.prepare_mode }}"
            echo "- 提交：\`${{ steps.push.outputs.commit_sha }}\`"
            if [[ "${{ steps.release.outputs.skip_commit }}" == "true" ]]; then
              echo "- 已跳过版本 bump commit（重试/覆盖）"
            fi
            echo "- 后续步骤：并行构建安装包并创建 GitHub Release"
          } >> "$GITHUB_STEP_SUMMARY"

  sync-dev:
    name: Sync release commit to dev
    needs: prepare-release
    if: needs.prepare-release.result == 'success' && needs.prepare-release.outputs.skip_commit != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev

      - name: Merge release commit into dev
        env:
          RELEASE_SHA: ${{ needs.prepare-release.outputs.commit_sha }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "$RELEASE_SHA" ]]; then
            echo "::error::缺少 release commit SHA，无法同步 dev。"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin dev main

          if ! git show-ref --verify --quiet "refs/remotes/origin/dev"; then
            echo "::error::远程不存在 dev 分支，无法自动同步。请先创建 dev 分支。"
            exit 1
          fi

          git checkout dev
          if git merge-base --is-ancestor "$RELEASE_SHA" HEAD; then
            echo "dev 已包含 release commit（$RELEASE_SHA），跳过 push。"
            exit 0
          fi

          if ! git merge --no-edit "$RELEASE_SHA"; then
            echo "::error::无法自动合并 release commit 到 dev。请在本地执行: git checkout dev && git merge origin/main"
            exit 1
          fi

          git push origin dev

      - name: Write sync summary
        shell: bash
        run: |
          {
            echo "### dev 分支已同步"
            echo ""
            echo "- 已合并 release commit：\`${{ needs.prepare-release.outputs.commit_sha }}\`"
            echo "- 本地继续开发：\`git checkout dev && git pull origin dev\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build installers
    needs: prepare-release
    uses: ./.github/workflows/installer-build-reusable.yml
    with:
      checkout_ref: ${{ needs.prepare-release.outputs.commit_sha }}
      is_tag_release: true
      release_version: ${{ needs.prepare-release.outputs.version }}
      build_windows_x64: ${{ inputs.build_windows_x64 }}
      build_macos_x64: ${{ inputs.build_macos_x64 }}
      build_macos_arm64: ${{ inputs.build_macos_arm64 }}
      windows_setup_exe: ${{ inputs.windows_setup_exe }}
      windows_msi: ${{ inputs.windows_msi }}
      windows_portable_zip: ${{ inputs.windows_portable_zip }}

  release:
    name: Publish GitHub Release
    needs:
      - check-release
      - prepare-release
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.commit_sha }}
          fetch-depth: 0

      - name: Build release body
        id: body
        env:
          RELEASE_BUILD_WINDOWS_X64: ${{ inputs.build_windows_x64 }}
          RELEASE_BUILD_MACOS_X64: ${{ inputs.build_macos_x64 }}
          RELEASE_BUILD_MACOS_ARM64: ${{ inputs.build_macos_arm64 }}
          RELEASE_WINDOWS_SETUP_EXE: ${{ inputs.windows_setup_exe }}
          RELEASE_WINDOWS_MSI: ${{ inputs.windows_msi }}
          RELEASE_WINDOWS_PORTABLE_ZIP: ${{ inputs.windows_portable_zip }}
        run: |
          node ./scripts/build-release-body.mjs \
            --version "${{ needs.prepare-release.outputs.version }}" \
            --commit-sha "${{ needs.prepare-release.outputs.commit_sha }}"

      - name: Remove orphan tag before retry publish
        if: needs.check-release.outputs.prepare_mode == 'retry'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${{ needs.prepare-release.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release ${TAG} 已存在，跳过 orphan tag 清理。"
            exit 0
          fi
          if git ls-remote --exit-code --tags origin "$TAG" >/dev/null 2>&1; then
            git push origin ":refs/tags/${TAG}"
            echo "已删除 orphan tag ${TAG}"
          fi

      - name: Retarget release tag to latest build commit
        if: needs.check-release.outputs.prepare_mode == 'overwrite'
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${{ needs.prepare-release.outputs.version }}"
          COMMIT="${{ needs.prepare-release.outputs.commit_sha }}"
          git fetch origin "$COMMIT"
          git tag -f "$TAG" "$COMMIT"
          git push -f origin "refs/tags/${TAG}"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Prepare release assets directory
        env:
          RELEASE_BUILD_WINDOWS_X64: ${{ inputs.build_windows_x64 }}
          RELEASE_BUILD_MACOS_X64: ${{ inputs.build_macos_x64 }}
          RELEASE_BUILD_MACOS_ARM64: ${{ inputs.build_macos_arm64 }}
          RELEASE_WINDOWS_SETUP_EXE: ${{ inputs.windows_setup_exe }}
          RELEASE_WINDOWS_MSI: ${{ inputs.windows_msi }}
          RELEASE_WINDOWS_PORTABLE_ZIP: ${{ inputs.windows_portable_zip }}
        run: |
          node ./scripts/prepare-release-assets-dir.mjs \
            --version "${{ needs.prepare-release.outputs.version }}" \
            --dir release-assets

      - name: Remove stale release installer assets
        if: inputs.cleanup_release_assets == true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node ./scripts/cleanup-github-release-assets.mjs \
            --tag "v${{ needs.prepare-release.outputs.version }}"

      - name: Verify release assets
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(find release-assets -type f | sort)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "::error::未找到任何 Release 安装包文件。"
            exit 1
          fi
          {
            echo "### Release Assets"
            echo ""
            for file in "${files[@]}"; do
              echo "- \`${file#release-assets/}\`"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare-release.outputs.version }}
          name: nrm-desktop v${{ needs.prepare-release.outputs.version }}
          target_commitish: ${{ needs.prepare-release.outputs.commit_sha }}
          body: ${{ steps.body.outputs.release_body }}
          files: release-assets/**/*
          draft: ${{ inputs.draft_release }}
          prerelease: false
          overwrite_files: true
