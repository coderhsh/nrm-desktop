name: Build installers (reusable)

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: 构建时检出的 commit SHA；留空则使用触发 workflow 的默认 ref
        type: string
        default: ''
      is_tag_release:
        description: 是否为 Release 构建（影响 Summary 文案与 release_version 输出）
        type: boolean
        default: false
      release_version:
        description: Release 版本号（不含 v 前缀）；非 Release 构建可留空
        type: string
        default: ''
      build_windows_x64:
        type: boolean
        default: true
      build_macos_x64:
        type: boolean
        default: false
      build_macos_arm64:
        type: boolean
        default: true
      windows_setup_exe:
        type: boolean
        default: true
      windows_msi:
        type: boolean
        default: true
      windows_portable_zip:
        type: boolean
        default: true
      artifact_retention_days:
        type: number
        default: 14
    secrets:
      TAURI_SIGNING_PRIVATE_KEY:
        required: false
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD:
        required: false
      TAURI_UPDATER_PUBKEY:
        required: false
    outputs:
      selected_platforms:
        value: ${{ jobs.prepare.outputs.selected_platforms }}
      windows_products:
        value: ${{ jobs.prepare.outputs.windows_products }}
      windows_setup_exe:
        value: ${{ jobs.prepare.outputs.windows_setup_exe }}
      windows_msi:
        value: ${{ jobs.prepare.outputs.windows_msi }}
      windows_portable_zip:
        value: ${{ jobs.prepare.outputs.windows_portable_zip }}
      is_tag_release:
        value: ${{ jobs.prepare.outputs.is_tag_release }}
      release_version:
        value: ${{ jobs.prepare.outputs.release_version }}

permissions:
  contents: read

env:
  CI: true
  CARGO_INCREMENTAL: 0

jobs:
  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      selected_platforms: ${{ steps.plan.outputs.selected_platforms }}
      windows_products: ${{ steps.plan.outputs.windows_products }}
      windows_setup_exe: ${{ steps.plan.outputs.windows_setup_exe }}
      windows_msi: ${{ steps.plan.outputs.windows_msi }}
      windows_portable_zip: ${{ steps.plan.outputs.windows_portable_zip }}
      is_tag_release: ${{ steps.plan.outputs.is_tag_release }}
      release_version: ${{ steps.plan.outputs.release_version }}

    steps:
      - name: Build matrix from inputs
        id: plan
        shell: bash
        env:
          IS_TAG_RELEASE: ${{ inputs.is_tag_release }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          BUILD_WINDOWS_X64: ${{ inputs.build_windows_x64 }}
          BUILD_MACOS_X64: ${{ inputs.build_macos_x64 }}
          BUILD_MACOS_ARM64: ${{ inputs.build_macos_arm64 }}
          WINDOWS_SETUP_EXE: ${{ inputs.windows_setup_exe }}
          WINDOWS_MSI: ${{ inputs.windows_msi }}
          WINDOWS_PORTABLE_ZIP: ${{ inputs.windows_portable_zip }}
        run: |
          set -euo pipefail

          is_tag_release="$IS_TAG_RELEASE"
          release_version="$RELEASE_VERSION"

          include_json=""
          selected_platforms=()
          windows_products=()

          append_matrix_item() {
            local item="$1"
            if [[ -n "$include_json" ]]; then
              include_json="$include_json,$item"
            else
              include_json="$item"
            fi
          }

          join_by_comma() {
            local joined=""
            for item in "$@"; do
              if [[ -n "$joined" ]]; then
                joined="$joined, $item"
              else
                joined="$item"
              fi
            done
            echo "$joined"
          }

          if [[ "$BUILD_WINDOWS_X64" == "true" ]]; then
            if [[ "$WINDOWS_SETUP_EXE" != "true" && "$WINDOWS_MSI" != "true" && "$WINDOWS_PORTABLE_ZIP" != "true" ]]; then
              echo "::error::已选择 Windows x64，但未选择任何 Windows 产物。请至少勾选 setup.exe、MSI 或 portable zip。"
              exit 1
            fi
            append_matrix_item '{"label":"Windows x64","os":"windows-latest","build-command":"pnpm build:win","artifact-suffix":"windows_x64"}'
            selected_platforms+=("Windows x64")

            if [[ "$WINDOWS_SETUP_EXE" == "true" ]]; then
              windows_products+=("setup.exe")
            fi
            if [[ "$WINDOWS_MSI" == "true" ]]; then
              windows_products+=("MSI")
            fi
            if [[ "$WINDOWS_PORTABLE_ZIP" == "true" ]]; then
              windows_products+=("portable zip")
            fi
          fi

          if [[ "$BUILD_MACOS_X64" == "true" ]]; then
            append_matrix_item '{"label":"macOS Intel","os":"macos-15-intel","build-command":"pnpm build","artifact-suffix":"macos_x64"}'
            selected_platforms+=("macOS Intel x64")
          fi

          if [[ "$BUILD_MACOS_ARM64" == "true" ]]; then
            append_matrix_item '{"label":"macOS Apple Silicon","os":"macos-15","build-command":"pnpm build","artifact-suffix":"macos_aarch64"}'
            selected_platforms+=("macOS Apple Silicon arm64")
          fi

          if [[ ${#selected_platforms[@]} -eq 0 ]]; then
            echo "::error::未选择任何构建平台。请至少勾选一个平台。"
            exit 1
          fi

          matrix="{\"include\":[$include_json]}"
          selected_platforms_text="$(join_by_comma "${selected_platforms[@]}")"
          windows_products_text="未选择 Windows"
          if [[ ${#windows_products[@]} -gt 0 ]]; then
            windows_products_text="$(join_by_comma "${windows_products[@]}")"
          fi

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "selected_platforms=$selected_platforms_text" >> "$GITHUB_OUTPUT"
          echo "windows_products=$windows_products_text" >> "$GITHUB_OUTPUT"
          echo "windows_setup_exe=$WINDOWS_SETUP_EXE" >> "$GITHUB_OUTPUT"
          echo "windows_msi=$WINDOWS_MSI" >> "$GITHUB_OUTPUT"
          echo "windows_portable_zip=$WINDOWS_PORTABLE_ZIP" >> "$GITHUB_OUTPUT"
          echo "is_tag_release=$is_tag_release" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"

          {
            echo "### 本次打包选择"
            echo ""
            if [[ "$is_tag_release" == "true" ]]; then
              echo "- 触发方式：一键发布（\`v${release_version}\`，构建完成后自动创建 GitHub Release）"
              echo ""
            else
              echo "- 触发方式：手动打包（仅上传 Artifacts）"
              echo ""
            fi
            echo "- 平台：$selected_platforms_text"
            echo "- Windows 产物：$windows_products_text"
            if [[ "$BUILD_MACOS_X64" == "true" ]]; then
              echo ""
              echo "> macOS Intel 使用 \`macos-15-intel\` runner，CI 分钟消耗高于 Apple Silicon；若无 Intel Mac 用户需求可取消勾选。"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  build-frontend:
    name: Build frontend
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref != '' && inputs.checkout_ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm sync:version && pnpm ui:build:ci

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist
          if-no-files-found: error
          retention-days: 1

  build:
    name: Build ${{ matrix.label }}
    needs:
      - prepare
      - build-frontend
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    env:
      NRM_SKIP_FRONTEND_BUILD: 'true'
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: 'true'

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref != '' && inputs.checkout_ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Add Windows Rust target
        if: runner.os == 'Windows'
        run: rustup target add x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true
          cache-all-crates: true
          shared-key: ${{ matrix.artifact-suffix }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Prepare Chocolatey download cache
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cacheDir = Join-Path $env:LOCALAPPDATA 'choco-cache'
          New-Item -ItemType Directory -Force -Path $cacheDir | Out-Null
          choco config set cacheLocation $cacheDir

      - name: Cache Windows packaging tools
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\choco-cache
            C:\ProgramData\chocolatey\lib\nsis
            C:\ProgramData\chocolatey\lib\wixtoolset
            C:\Program Files (x86)\NSIS
            C:\Program Files (x86)\WiX Toolset v3.11
          key: ${{ runner.os }}-packaging-nsis-wix-v1
          restore-keys: |
            ${{ runner.os }}-packaging-nsis-wix-

      - name: Install Windows packaging tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $extraPaths = @(
            'C:\Program Files (x86)\NSIS'
            'C:\ProgramData\chocolatey\bin'
          )
          Get-ChildItem 'C:\Program Files (x86)\WiX Toolset v3.*\bin' -ErrorAction SilentlyContinue |
            ForEach-Object { $extraPaths += $_.FullName }
          $env:Path = ($extraPaths -join ';') + ';' + $env:Path

          $hasNsis = [bool](Get-Command makensis -ErrorAction SilentlyContinue)
          $hasWix = [bool](Get-Command candle -ErrorAction SilentlyContinue)
          if ($hasNsis -and $hasWix) {
            Write-Host 'NSIS and WiX already available (cache hit); skipping choco install.'
            makensis -VERSION
            exit 0
          }

          choco install nsis wixtoolset -y --no-progress

      - name: Read app version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "APP_VERSION=$version" >> "$GITHUB_ENV"

      - name: Verify updater signing secrets
        if: inputs.is_tag_release == true
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: |
          set -euo pipefail
          missing=()
          [[ -n "$TAURI_SIGNING_PRIVATE_KEY" ]] || missing+=("TAURI_SIGNING_PRIVATE_KEY")
          [[ -n "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ]] || missing+=("TAURI_SIGNING_PRIVATE_KEY_PASSWORD")
          [[ -n "$TAURI_UPDATER_PUBKEY" ]] || missing+=("TAURI_UPDATER_PUBKEY")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::缺少 updater 签名密钥 Secrets: ${missing[*]}"
            exit 1
          fi

      - name: Apply updater public key
        if: inputs.is_tag_release == true
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: node ./scripts/apply-updater-pubkey.mjs

      - name: Write build summary
        shell: bash
        env:
          MATRIX_LABEL: ${{ matrix.label }}
          MATRIX_ARTIFACT_SUFFIX: ${{ matrix.artifact-suffix }}
          SELECTED_PLATFORMS: ${{ needs.prepare.outputs.selected_platforms }}
          WINDOWS_PRODUCTS: ${{ needs.prepare.outputs.windows_products }}
        run: |
          {
            echo "### Build $MATRIX_LABEL"
            echo ""
            echo "- 版本：v$APP_VERSION"
            echo "- 已选平台：$SELECTED_PLATFORMS"
            if [[ "$MATRIX_ARTIFACT_SUFFIX" == "windows_x64" ]]; then
              echo "- Windows 产物：$WINDOWS_PRODUCTS"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build installer
        env:
          NRM_WINDOWS_SETUP_EXE: ${{ needs.prepare.outputs.windows_setup_exe }}
          NRM_WINDOWS_MSI: ${{ needs.prepare.outputs.windows_msi }}
          NRM_WINDOWS_PORTABLE_ZIP: ${{ needs.prepare.outputs.windows_portable_zip }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: ${{ matrix.build-command }}

      - name: Create Windows portable zip
        if: runner.os == 'Windows' && needs.prepare.outputs.windows_portable_zip == 'true'
        shell: pwsh
        env:
          MATRIX_ARTIFACT_SUFFIX: ${{ matrix.artifact-suffix }}
        run: |
          $portableRoot = "portable\nrm-desktop"
          $exePath = "src-tauri\target\x86_64-pc-windows-msvc\release\nrm-desktop.exe"
          $zipName = "nrm-desktop_${env:APP_VERSION}_${env:MATRIX_ARTIFACT_SUFFIX}-portable.zip"
          $zipPath = "portable\$zipName"

          if (!(Test-Path $exePath)) {
            throw "未找到 Windows 主程序：$exePath"
          }

          New-Item -ItemType Directory -Force -Path $portableRoot | Out-Null
          Copy-Item $exePath "$portableRoot\nrm-desktop.exe" -Force
          Compress-Archive -Path "$portableRoot\*" -DestinationPath $zipPath -Force

      - name: Upload Windows setup.exe artifact
        if: runner.os == 'Windows' && needs.prepare.outputs.windows_setup_exe == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: nrm-desktop_${{ env.APP_VERSION }}_${{ matrix.artifact-suffix }}-setup.exe
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/nrm-desktop_${{ env.APP_VERSION }}_${{ matrix.artifact-suffix }}-setup.exe
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}

      - name: Upload Windows setup.exe signature artifact
        if: runner.os == 'Windows' && needs.prepare.outputs.windows_setup_exe == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: nrm-desktop_${{ env.APP_VERSION }}_${{ matrix.artifact-suffix }}-setup.exe.sig
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/nrm-desktop_${{ env.APP_VERSION }}_${{ matrix.artifact-suffix }}-setup.exe.sig
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}

      - name: Upload Windows MSI artifact
        if: runner.os == 'Windows' && needs.prepare.outputs.windows_msi == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: nrm-desktop_${{ env.APP_VERSION }}_${{ matrix.artifact-suffix }}.msi
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/nrm-desktop_${{ env.APP_VERSION }}_${{ matrix.artifact-suffix }}.msi
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}

      - name: Upload Windows portable zip artifact
        if: runner.os == 'Windows' && needs.prepare.outputs.windows_portable_zip == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: nrm-desktop_${{ env.APP_VERSION }}_${{ matrix.artifact-suffix }}-portable.zip
          path: portable/nrm-desktop_${{ env.APP_VERSION }}_${{ matrix.artifact-suffix }}-portable.zip
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}

      - name: Upload macOS DMG artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: nrm-desktop_${{ env.APP_VERSION }}_${{ matrix.artifact-suffix }}.dmg
          path: src-tauri/target/release/bundle/dmg/nrm-desktop_${{ env.APP_VERSION }}_${{ matrix.artifact-suffix }}.dmg
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}

      - name: Upload macOS updater archive artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: nrm-desktop_${{ env.APP_VERSION }}_${{ matrix.artifact-suffix }}.app.tar.gz
          path: src-tauri/target/release/bundle/macos/nrm-desktop_${{ env.APP_VERSION }}_${{ matrix.artifact-suffix }}.app.tar.gz
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}

      - name: Upload macOS updater signature artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: nrm-desktop_${{ env.APP_VERSION }}_${{ matrix.artifact-suffix }}.app.tar.gz.sig
          path: src-tauri/target/release/bundle/macos/nrm-desktop_${{ env.APP_VERSION }}_${{ matrix.artifact-suffix }}.app.tar.gz.sig
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}
