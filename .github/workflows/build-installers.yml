name: Build Installers

# 手动触发：在 GitHub Actions 页面点击 Run workflow 后才会开始打包。
on:
  workflow_dispatch:
    inputs:
      build_windows_x64:
        description: 构建 Windows x64
        type: boolean
        default: true
      build_macos_x64:
        description: 构建 macOS Intel x64
        type: boolean
        default: true
      build_macos_arm64:
        description: 构建 macOS Apple Silicon arm64
        type: boolean
        default: true
      windows_setup_exe:
        description: Windows 产出 setup.exe（NSIS）
        type: boolean
        default: true
      windows_msi:
        description: Windows 产出 .msi
        type: boolean
        default: true
      windows_portable_zip:
        description: Windows 产出 portable.zip 免安装版
        type: boolean
        default: true

# 这里只需要读取仓库源码，不创建 Release、不写入 tag，也不上传到仓库内容区。
permissions:
  contents: read

# 同一个分支重复触发时取消旧任务，避免多个耗时的 Tauri 打包任务排队。
concurrency:
  group: build-installers-${{ github.ref }}
  cancel-in-progress: true

env:
  # 让脚本识别当前运行在 CI 环境；macOS 打包脚本会据此使用非交互方式生成 DMG。
  CI: true
  # 关闭 Rust 增量编译，CI 上更稳定，也更利于缓存复用。
  CARGO_INCREMENTAL: 0

jobs:
  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      selected_platforms: ${{ steps.plan.outputs.selected_platforms }}
      windows_products: ${{ steps.plan.outputs.windows_products }}

    steps:
      # 根据手动触发时勾选的选项生成动态 matrix，避免没必要的平台 job 被启动。
      - name: Build matrix from inputs
        id: plan
        shell: bash
        env:
          BUILD_WINDOWS_X64: ${{ inputs.build_windows_x64 }}
          BUILD_MACOS_X64: ${{ inputs.build_macos_x64 }}
          BUILD_MACOS_ARM64: ${{ inputs.build_macos_arm64 }}
          WINDOWS_SETUP_EXE: ${{ inputs.windows_setup_exe }}
          WINDOWS_MSI: ${{ inputs.windows_msi }}
          WINDOWS_PORTABLE_ZIP: ${{ inputs.windows_portable_zip }}
        run: |
          set -euo pipefail

          include_json=""
          selected_platforms=()
          windows_products=()

          append_matrix_item() {
            local item="$1"
            if [[ -n "$include_json" ]]; then
              include_json="$include_json,$item"
            else
              include_json="$item"
            fi
          }

          join_by_comma() {
            local joined=""
            for item in "$@"; do
              if [[ -n "$joined" ]]; then
                joined="$joined, $item"
              else
                joined="$item"
              fi
            done
            echo "$joined"
          }

          if [[ "$BUILD_WINDOWS_X64" == "true" ]]; then
            if [[ "$WINDOWS_SETUP_EXE" != "true" && "$WINDOWS_MSI" != "true" && "$WINDOWS_PORTABLE_ZIP" != "true" ]]; then
              echo "::error::已选择 Windows x64，但未选择任何 Windows 产物。请至少勾选 setup.exe、MSI 或 portable zip。"
              exit 1
            fi
            append_matrix_item '{"label":"Windows x64","os":"windows-latest","build-command":"pnpm build:win","artifact-suffix":"windows-x64"}'
            selected_platforms+=("Windows x64")

            if [[ "$WINDOWS_SETUP_EXE" == "true" ]]; then
              windows_products+=("setup.exe")
            fi
            if [[ "$WINDOWS_MSI" == "true" ]]; then
              windows_products+=("MSI")
            fi
            if [[ "$WINDOWS_PORTABLE_ZIP" == "true" ]]; then
              windows_products+=("portable zip")
            fi
          fi

          if [[ "$BUILD_MACOS_X64" == "true" ]]; then
            append_matrix_item '{"label":"macOS Intel","os":"macos-15-intel","build-command":"pnpm build","artifact-suffix":"macos-x64"}'
            selected_platforms+=("macOS Intel x64")
          fi

          if [[ "$BUILD_MACOS_ARM64" == "true" ]]; then
            append_matrix_item '{"label":"macOS Apple Silicon","os":"macos-15","build-command":"pnpm build","artifact-suffix":"macos-arm64"}'
            selected_platforms+=("macOS Apple Silicon arm64")
          fi

          if [[ ${#selected_platforms[@]} -eq 0 ]]; then
            echo "::error::未选择任何构建平台。请至少勾选一个平台。"
            exit 1
          fi

          matrix="{\"include\":[$include_json]}"
          selected_platforms_text="$(join_by_comma "${selected_platforms[@]}")"
          windows_products_text="未选择 Windows"
          if [[ ${#windows_products[@]} -gt 0 ]]; then
            windows_products_text="$(join_by_comma "${windows_products[@]}")"
          fi

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "selected_platforms=$selected_platforms_text" >> "$GITHUB_OUTPUT"
          echo "windows_products=$windows_products_text" >> "$GITHUB_OUTPUT"

          {
            echo "### 本次打包选择"
            echo ""
            echo "- 平台：$selected_platforms_text"
            echo "- Windows 产物：$windows_products_text"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build ${{ matrix.label }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    strategy:
      # 一个平台失败时不取消其他平台，方便一次触发后看到所有平台的真实状态。
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      # 拉取仓库源码。
      - name: Checkout
        uses: actions/checkout@v4

      # 固定 pnpm 版本，避免不同 runner 默认版本不一致。
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
          run_install: false

      # Node 22 符合 package.json 的 engines 约束；同时启用 pnpm 依赖缓存。
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # 安装 stable Rust toolchain，供 Tauri 后端编译使用。
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Windows 打包脚本显式指定 x86_64-pc-windows-msvc target，提前安装目标平台。
      - name: Add Windows Rust target
        if: runner.os == 'Windows'
        run: rustup target add x86_64-pc-windows-msvc

      # 缓存 Cargo registry、git 依赖和 src-tauri/target，减少重复构建耗时。
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      # 使用 lockfile 安装前端依赖，保证 CI 与仓库锁定版本一致。
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 从 package.json 读取应用版本号，后续用于 Artifacts 命名，例如 nrm-desktop-v1.0.0-windows-x64.msi。
      - name: Read app version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "APP_VERSION=$version" >> "$GITHUB_ENV"

      # 在 GitHub Step Summary 中记录版本、平台和产物选择，便于回看本次 run 的实际范围。
      - name: Write build summary
        shell: bash
        env:
          MATRIX_LABEL: ${{ matrix.label }}
          MATRIX_ARTIFACT_SUFFIX: ${{ matrix.artifact-suffix }}
          SELECTED_PLATFORMS: ${{ needs.prepare.outputs.selected_platforms }}
          WINDOWS_PRODUCTS: ${{ needs.prepare.outputs.windows_products }}
        run: |
          {
            echo "### Build $MATRIX_LABEL"
            echo ""
            echo "- 版本：v$APP_VERSION"
            echo "- 已选平台：$SELECTED_PLATFORMS"
            if [[ "$MATRIX_ARTIFACT_SUFFIX" == "windows-x64" ]]; then
              echo "- Windows 产物：$WINDOWS_PRODUCTS"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # 执行矩阵中指定的平台构建命令：Windows 用 build:win，macOS 用 build。
      - name: Build installer
        env:
          NRM_WINDOWS_SETUP_EXE: ${{ inputs.windows_setup_exe }}
          NRM_WINDOWS_MSI: ${{ inputs.windows_msi }}
          NRM_WINDOWS_PORTABLE_ZIP: ${{ inputs.windows_portable_zip }}
        run: ${{ matrix.build-command }}

      # 生成 Windows 免安装版 zip：包含 release 主程序，用户解压后可直接双击 nrm-desktop.exe。
      - name: Create Windows portable zip
        if: runner.os == 'Windows' && inputs.windows_portable_zip
        shell: pwsh
        run: |
          $portableRoot = "portable\nrm-desktop"
          $exePath = "src-tauri\target\x86_64-pc-windows-msvc\release\nrm-desktop.exe"
          $zipPath = "portable\nrm-desktop-v$env:APP_VERSION-${{ matrix.artifact-suffix }}-portable.zip"

          if (!(Test-Path $exePath)) {
            throw "未找到 Windows 主程序：$exePath"
          }

          New-Item -ItemType Directory -Force -Path $portableRoot | Out-Null
          Copy-Item $exePath "$portableRoot\nrm-desktop.exe" -Force
          Compress-Archive -Path "$portableRoot\*" -DestinationPath $zipPath -Force

      # 单独上传 Windows NSIS 安装包（通常是 setup.exe），方便在 Artifacts 列表中直接区分。
      - name: Upload Windows setup.exe artifact
        if: runner.os == 'Windows' && inputs.windows_setup_exe
        uses: actions/upload-artifact@v4
        with:
          name: nrm-desktop-v${{ env.APP_VERSION }}-${{ matrix.artifact-suffix }}-setup.exe
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14

      # 单独上传 Windows MSI 安装包；如果未产出 MSI，该步骤会失败，避免误以为两类安装包都打好了。
      - name: Upload Windows MSI artifact
        if: runner.os == 'Windows' && inputs.windows_msi
        uses: actions/upload-artifact@v4
        with:
          name: nrm-desktop-v${{ env.APP_VERSION }}-${{ matrix.artifact-suffix }}.msi
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 14

      # 上传 Windows 免安装版 zip，适合不想运行安装器的场景。
      - name: Upload Windows portable zip artifact
        if: runner.os == 'Windows' && inputs.windows_portable_zip
        uses: actions/upload-artifact@v4
        with:
          name: nrm-desktop-v${{ env.APP_VERSION }}-${{ matrix.artifact-suffix }}-portable.zip
          path: portable/nrm-desktop-v${{ env.APP_VERSION }}-${{ matrix.artifact-suffix }}-portable.zip
          if-no-files-found: error
          retention-days: 14

      # 上传 macOS DMG；Intel 和 Apple Silicon 通过矩阵后缀区分。
      - name: Upload macOS DMG artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: nrm-desktop-v${{ env.APP_VERSION }}-${{ matrix.artifact-suffix }}.dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 14
